# foot terminal config.
# Whole dir symlinked into place:  ~/.config/foot -> ~/dotfiles/foot
#
# Purpose (roadmap step 5): make the terminal's black background
# semi-transparent so the wallpaper shows through *behind* the text, while
# the text itself stays fully opaque. This is foot's own `alpha` — scoped to
# foot by definition, not Hyprland's global decoration.opacity. It applies to
# every foot instance, so both plain terminals (Super+Q) and the yazi
# file-manager window (foot --app-id=yazi) get it; other apps stay opaque.
#
# COLOR SOURCE OF TRUTH: hypr/colors.lua
# foot.ini can't require() the Lua palette, so the hex below mirrors it by
# hand (same convention as waybar/style.css and rofi/config.rasi). Keep in
# sync; roadmap step 7 later generates all of these from one palette.
#   background  0d0d0d   near-black  (colors.lua M.background)

# [colors-dark], not [colors]: foot 1.27 split colors into dark/light variants
# (chosen by the system color-scheme preference) and deprecated the old
# [colors]. This rice is dark-only, so a single dark block is all we need.
[colors-dark]
# 0.0 = fully transparent, 1.0 = fully opaque. Starting point; final value is
# a real-hardware judgment (software rendering in the VM can't fairly show it).
alpha=0.85
# Only the background is themed here — the transparency reveals palette black,
# not foot's default gray. Foreground/ANSI colors stay foot defaults for now
# (readable); a full red/black foot theme is separate from this transparency step.
background=0d0d0d

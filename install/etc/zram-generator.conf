# zram compressed-swap config — copy of the VM's /etc/systemd/zram-generator.conf.
# Installing the zram-generator PACKAGE alone does nothing: it only acts when
# this file exists. Restore it on a new machine with:
#   sudo cp ~/dotfiles/install/etc/zram-generator.conf /etc/systemd/zram-generator.conf
# then reboot (or: sudo systemctl daemon-reload && sudo systemctl start systemd-zram-setup@zram0)
# Verify with:  swapon --show   (expect a /dev/zram0 line)
#
# No zram-size line = the generator's default (half of RAM, capped at 4G).
[zram0]
compression-algorithm = zstd

# hyprpaper — the wallpaper daemon on real hardware.
#
# Symlinked into place:  ~/.config/hypr/hyprpaper.conf -> ~/dotfiles/hypr/hyprpaper.conf
#
# The VM ran `swaybg` instead: hyprpaper renders through OpenGL and needs a real
# GL/EGL context the software-rendered VirtualBox GPU couldn't provide, so
# nothing showed. See vm-substitutions.md. We switched back for hyprpaper's IPC:
# theme/set-wallpaper.sh swaps the live wallpaper over `hyprctl hyprpaper`
# inside the running daemon instead of killing and respawning it (verified: same
# PID before and after), so there's no flicker — and phase 9's settings app gets
# a clean surface to drive.
#
# SYNTAX — this is hyprpaper 0.8.x, which rewrote both the config and the IPC on
# top of hyprtoolkit/hyprwire. Wallpapers are `wallpaper { }` blocks, NOT the old
# `preload = ` / `wallpaper = mon,path` lines that most guides online still show;
# those keys no longer exist and hyprpaper starts with "no target: no wp will be
# created". Manual preloading is gone too (0.8 handles it internally).
#
# This file only sets the LOGIN wallpaper. Runtime swaps go through
# set-wallpaper.sh and are local, gitignored state (theme/state/active-wallpaper)
# — the committed path below stays on the last agreed background, honouring the
# "don't commit wallpaper changes" rule in CLAUDE.md. Don't edit it to change
# your live wallpaper; run `theme/set-wallpaper.sh <image>` instead.
#
# NOTE: hyprpaper does not re-read this file while running (verified — editing it
# under a live daemon changes nothing, and SIGUSR1 kills the process rather than
# reloading). That's fine: nothing edits it at runtime, and set-wallpaper.sh goes
# through IPC instead.

wallpaper {
    # Empty monitor = the fallback that applies to every output.
    monitor =
    path = ~/.config/hypr/wallpapers/gargantua.jpg
    # cover = scale to fill, cropping the overflow — the same framing swaybg's
    # `-m fill` gave in the VM. (Other options: contain, tile.)
    fit_mode = cover
}

# No splash text over the wallpaper.
splash = false
